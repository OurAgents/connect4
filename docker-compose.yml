services:
  connect4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connect4-game
    ports:
      - "8777:8777"
    restart: unless-stopped
    volumes:
      # Mount a data directory to persist the SQLite database across container restarts
      - ./data:/app/backend/data
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: connect4-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - connect4 # Changed from connect4-game
    env_file:
      - .env
